<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>antipyretic_calculator_final</title>

<style>
body{font-family:sans-serif;background:#f5f6f8;margin:0;padding:10px}
.card{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px}
button{padding:12px 16px;border:none;border-radius:12px;font-size:15px;font-weight:700}

.row{display:flex;gap:8px}
.drug-btn{flex:1}
.ap{background:#ffe8ee;color:#ff5a7a}
.ib{background:#e9edff;color:#4f67ff}

.summary{padding:12px;border-radius:12px}
.bad{background:#fef2f2}
.good{background:#eff6ff}
.warn{background:#fff7ed}

.big{font-size:18px;font-weight:800}
.kicker{font-size:12px;color:#666}

table{width:100%;table-layout:fixed}
td{padding:6px;text-align:center}
</style>
</head>

<body>

<div class="card">
  <div class="row">
    <button class="drug-btn ap" onclick="setDrug('APAP')">아세트</button>
    <button class="drug-btn ib" onclick="setDrug('IBU')">이부·덱시부</button>
  </div>
</div>

<div class="card">
  <canvas id="chart" height="200"></canvas>
</div>

<div id="summary" class="card summary"></div>

<div class="card">
  <div class="big">현재 개별 농도</div>
  <div id="each"></div>
</div>

<script>

let active='APAP';

const DRUGS={
 APAP:{tHalf:2.2,Ka:2},
 IBU:{tHalf:2,Ka:1.5},
 DEX:{tHalf:2.2,Ka:1.5}
};

function setDrug(d){
 active=d;
 draw();
}

function pk(drug,time,doses){
 const d=DRUGS[drug];
 const Ke=Math.log(2)/d.tHalf;
 const Ka=d.Ka;
 let C=0;

 doses.forEach(x=>{
   const dt=(time-x.t)/3600000;
   if(dt>0){
     C+=x.mg*(Ka/(Ka-Ke))*(Math.exp(-Ke*dt)-Math.exp(-Ka*dt));
   }
 });

 return C;
}

function draw(){

 const canvas=document.getElementById('chart');
 const ctx=canvas.getContext('2d');
 const W=canvas.width=canvas.clientWidth;
 const H=canvas.height;

 ctx.clearRect(0,0,W,H);

 const now=Date.now();

 const doses=[
   {drug:'IBU',t:now-6*3600*1000,mg:200},
   {drug:'APAP',t:now-2*3600*1000,mg:300}
 ];

 let apap=pk('APAP',now,doses.filter(d=>d.drug==='APAP'))/10;
 let ibu=pk('IBU',now,doses.filter(d=>d.drug==='IBU'))/10;
 let dex=pk('DEX',now,doses.filter(d=>d.drug==='DEX'))/10;

 // 그래프 (단차 느낌)
 ctx.fillStyle="#ff5a7a";
 ctx.fillRect(0,H-apap*3,W,2);

 ctx.fillStyle="#4f67ff";
 ctx.fillRect(0,H-ibu*3,W,2);

 // summary
 let val= active==='APAP'?apap:ibu;
 let low= active==='APAP'?10:15;
 let high= active==='APAP'?25:30;

 let cls='',msg='',state='';

 if(val<low){
   cls='bad';
   state='낮음';
   msg='추가 복용 고려';
 }
 else if(val<=high){
   cls='good';
   state='적정';
   msg='유지';
 }
 else{
   cls='warn';
   state='높음';
   msg='복용 금지';
 }

 const el=document.getElementById('summary');
 el.className='card summary '+cls;
 el.innerHTML=`
   <div class="big">${state} (${val.toFixed(1)} μg/mL)</div>
   <div class="kicker">${msg}</div>
 `;

 // 개별 농도
 document.getElementById('each').innerHTML=
   `아세트 ${apap.toFixed(1)} · 이부 ${ibu.toFixed(1)} · 덱시 ${dex.toFixed(1)} μg/mL`;
}

draw();

</script>

</body>
</html>
